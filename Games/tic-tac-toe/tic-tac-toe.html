<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tic Tac Toe</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: #0f0f1a;
      font-family: 'Segoe UI', system-ui, sans-serif;
      color: #e2e8f0;
    }

    h1 {
      font-size: 2.4rem;
      font-weight: 700;
      letter-spacing: 0.08em;
      margin-bottom: 0.5rem;
      background: linear-gradient(135deg, #818cf8, #c084fc);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    #status {
      font-size: 1.1rem;
      min-height: 1.6em;
      margin-bottom: 1.6rem;
      color: #94a3b8;
      transition: color 0.3s;
    }

    #status.win  { color: #86efac; }
    #status.draw { color: #fbbf24; }

    #score-bar {
      display: flex;
      gap: 2.5rem;
      margin-bottom: 1.6rem;
      font-size: 1rem;
    }

    .score-box {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.25rem;
    }

    .score-label {
      font-size: 0.72rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: #64748b;
    }

    .score-label.x { color: #818cf8; }
    .score-label.o { color: #c084fc; }
    .score-label.d { color: #64748b; }

    .score-value {
      font-size: 1.8rem;
      font-weight: 700;
      line-height: 1;
    }

    .score-value.x { color: #818cf8; }
    .score-value.o { color: #c084fc; }

    #board {
      display: grid;
      grid-template-columns: repeat(3, 110px);
      grid-template-rows:    repeat(3, 110px);
      gap: 10px;
      margin-bottom: 1.8rem;
    }

    .cell {
      background: #1e1e30;
      border-radius: 12px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 3rem;
      font-weight: 800;
      transition: background 0.15s, transform 0.1s;
      user-select: none;
      position: relative;
      overflow: hidden;
    }

    .cell:hover:not(.taken) {
      background: #252540;
      transform: scale(1.04);
    }

    .cell.taken { cursor: default; }

    .cell.x { color: #818cf8; }
    .cell.o { color: #c084fc; }

    .cell.win-cell {
      background: #1a2e1a;
      box-shadow: 0 0 0 2px #86efac55;
    }

    .cell.win-cell.x { background: #1a1a30; box-shadow: 0 0 0 2px #818cf888; }
    .cell.win-cell.o { background: #2a1a30; box-shadow: 0 0 0 2px #c084fc88; }

    #controls {
      display: flex;
      gap: 1rem;
    }

    button {
      padding: 0.55rem 1.4rem;
      border: none;
      border-radius: 8px;
      font-size: 0.9rem;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.2s, transform 0.1s;
    }

    button:hover  { opacity: 0.85; transform: translateY(-1px); }
    button:active { transform: translateY(0); }

    #btn-restart {
      background: linear-gradient(135deg, #818cf8, #c084fc);
      color: #fff;
    }

    #btn-reset-score {
      background: #1e1e30;
      color: #64748b;
      border: 1px solid #2e2e45;
    }

    #mode-bar {
      display: flex;
      gap: 0.5rem;
      margin-bottom: 1.4rem;
    }

    .mode-btn {
      padding: 0.4rem 1rem;
      border-radius: 999px;
      font-size: 0.8rem;
      font-weight: 600;
      background: #1e1e30;
      color: #64748b;
      border: 1px solid #2e2e45;
      cursor: pointer;
      transition: all 0.2s;
    }

    .mode-btn.active {
      background: linear-gradient(135deg, #818cf8, #c084fc);
      color: #fff;
      border-color: transparent;
    }
  </style>
</head>
<body>

<h1>Tic Tac Toe</h1>
<div id="status">X's turn</div>

<div id="score-bar">
  <div class="score-box">
    <span class="score-label x">X</span>
    <span class="score-value x" id="score-x">0</span>
  </div>
  <div class="score-box">
    <span class="score-label d">Draws</span>
    <span class="score-value" id="score-d">0</span>
  </div>
  <div class="score-box">
    <span class="score-label o">O</span>
    <span class="score-value o" id="score-o">0</span>
  </div>
</div>

<div id="mode-bar">
  <button class="mode-btn active" data-mode="pvp">2 Players</button>
  <button class="mode-btn"       data-mode="pvc">vs Computer</button>
</div>

<div id="board">
  <div class="cell" data-i="0"></div>
  <div class="cell" data-i="1"></div>
  <div class="cell" data-i="2"></div>
  <div class="cell" data-i="3"></div>
  <div class="cell" data-i="4"></div>
  <div class="cell" data-i="5"></div>
  <div class="cell" data-i="6"></div>
  <div class="cell" data-i="7"></div>
  <div class="cell" data-i="8"></div>
</div>

<div id="controls">
  <button id="btn-restart">New Game</button>
  <button id="btn-reset-score">Reset Scores</button>
</div>

<script>
  const WINS = [
    [0,1,2],[3,4,5],[6,7,8],
    [0,3,6],[1,4,7],[2,5,8],
    [0,4,8],[2,4,6]
  ];

  const cells    = document.querySelectorAll('.cell');
  const statusEl = document.getElementById('status');
  const scoreX   = document.getElementById('score-x');
  const scoreO   = document.getElementById('score-o');
  const scoreD   = document.getElementById('score-d');
  const modeBar  = document.getElementById('mode-bar');

  let board, current, gameOver, mode;
  let scores = { X: 0, O: 0, D: 0 };

  function init() {
    mode = document.querySelector('.mode-btn.active').dataset.mode;
  }

  function startGame() {
    board   = Array(9).fill(null);
    current = 'X';
    gameOver = false;
    cells.forEach(c => {
      c.textContent = '';
      c.className   = 'cell';
    });
    setStatus(`X's turn`);
  }

  function setStatus(msg, cls = '') {
    statusEl.textContent = msg;
    statusEl.className   = cls;
  }

  function checkWin(b, p) {
    return WINS.find(combo => combo.every(i => b[i] === p)) || null;
  }

  function checkDraw(b) {
    return b.every(v => v !== null);
  }

  function handleClick(e) {
    const cell = e.currentTarget;
    const i    = +cell.dataset.i;
    if (gameOver || board[i]) return;
    if (mode === 'pvc' && current === 'O') return;
    playMove(i);
  }

  function playMove(i) {
    board[i]      = current;
    const cell    = cells[i];
    cell.textContent = current;
    cell.classList.add('taken', current.toLowerCase());

    const winCombo = checkWin(board, current);
    if (winCombo) {
      winCombo.forEach(idx => cells[idx].classList.add('win-cell', current.toLowerCase()));
      setStatus(`${current} wins!`, 'win');
      scores[current]++;
      updateScores();
      gameOver = true;
      return;
    }

    if (checkDraw(board)) {
      setStatus("It's a draw!", 'draw');
      scores.D++;
      updateScores();
      gameOver = true;
      return;
    }

    current = current === 'X' ? 'O' : 'X';
    setStatus(`${current}'s turn`);

    if (mode === 'pvc' && current === 'O' && !gameOver) {
      setTimeout(computerMove, 420);
    }
  }

  function updateScores() {
    scoreX.textContent = scores.X;
    scoreO.textContent = scores.O;
    scoreD.textContent = scores.D;
  }

  // Minimax AI
  function minimax(b, isMax) {
    if (checkWin(b, 'O')) return  10;
    if (checkWin(b, 'X')) return -10;
    if (b.every(v => v))  return   0;

    if (isMax) {
      let best = -Infinity;
      b.forEach((v, i) => {
        if (!v) {
          b[i] = 'O';
          best = Math.max(best, minimax(b, false));
          b[i] = null;
        }
      });
      return best;
    } else {
      let best = Infinity;
      b.forEach((v, i) => {
        if (!v) {
          b[i] = 'X';
          best = Math.min(best, minimax(b, true));
          b[i] = null;
        }
      });
      return best;
    }
  }

  function computerMove() {
    let best = -Infinity, bestIdx = -1;
    board.forEach((v, i) => {
      if (!v) {
        board[i] = 'O';
        const score = minimax(board, false);
        board[i] = null;
        if (score > best) { best = score; bestIdx = i; }
      }
    });
    if (bestIdx !== -1) playMove(bestIdx);
  }

  // Event listeners
  cells.forEach(c => c.addEventListener('click', handleClick));

  document.getElementById('btn-restart').addEventListener('click', startGame);

  document.getElementById('btn-reset-score').addEventListener('click', () => {
    scores = { X: 0, O: 0, D: 0 };
    updateScores();
    startGame();
  });

  modeBar.querySelectorAll('.mode-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      modeBar.querySelectorAll('.mode-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      startGame();
    });
  });

  init();
  startGame();
</script>
</body>
</html>
