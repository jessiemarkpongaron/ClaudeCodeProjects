<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Calculator</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      background: #1a1a2e;
      font-family: 'Segoe UI', sans-serif;
    }

    .calculator {
      background: #16213e;
      border-radius: 20px;
      padding: 24px;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
      width: 320px;
    }

    .display {
      background: #0f3460;
      border-radius: 12px;
      padding: 20px 16px 12px;
      margin-bottom: 20px;
      text-align: right;
      min-height: 90px;
      display: flex;
      flex-direction: column;
      justify-content: flex-end;
    }

    .display .expression {
      color: #8892a4;
      font-size: 14px;
      min-height: 20px;
      word-break: break-all;
      margin-bottom: 4px;
    }

    .display .result {
      color: #e2e8f0;
      font-size: 36px;
      font-weight: 300;
      word-break: break-all;
      line-height: 1.1;
    }

    .buttons {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 10px;
    }

    button {
      border: none;
      border-radius: 12px;
      font-size: 18px;
      font-weight: 500;
      cursor: pointer;
      padding: 18px 0;
      transition: transform 0.08s, filter 0.08s;
      user-select: none;
    }

    button:active {
      transform: scale(0.94);
      filter: brightness(1.2);
    }

    .btn-number {
      background: #1a1a40;
      color: #e2e8f0;
    }

    .btn-operator {
      background: #533483;
      color: #e2e8f0;
    }

    .btn-equals {
      background: #e94560;
      color: #fff;
    }

    .btn-clear {
      background: #0f3460;
      color: #e94560;
    }

    .btn-action {
      background: #0f3460;
      color: #8892a4;
    }

    .btn-zero {
      grid-column: span 2;
    }

    button:hover {
      filter: brightness(1.15);
    }
  </style>
</head>
<body>
  <div class="calculator">
    <div class="display">
      <div class="expression" id="expression"></div>
      <div class="result" id="result">0</div>
    </div>
    <div class="buttons">
      <button class="btn-clear" onclick="clearAll()">AC</button>
      <button class="btn-action" onclick="toggleSign()">+/-</button>
      <button class="btn-action" onclick="percent()">%</button>
      <button class="btn-operator" onclick="inputOperator('/')">÷</button>

      <button class="btn-number" onclick="inputDigit('7')">7</button>
      <button class="btn-number" onclick="inputDigit('8')">8</button>
      <button class="btn-number" onclick="inputDigit('9')">9</button>
      <button class="btn-operator" onclick="inputOperator('*')">×</button>

      <button class="btn-number" onclick="inputDigit('4')">4</button>
      <button class="btn-number" onclick="inputDigit('5')">5</button>
      <button class="btn-number" onclick="inputDigit('6')">6</button>
      <button class="btn-operator" onclick="inputOperator('-')">−</button>

      <button class="btn-number" onclick="inputDigit('1')">1</button>
      <button class="btn-number" onclick="inputDigit('2')">2</button>
      <button class="btn-number" onclick="inputDigit('3')">3</button>
      <button class="btn-operator" onclick="inputOperator('+')">+</button>

      <button class="btn-number btn-zero" onclick="inputDigit('0')">0</button>
      <button class="btn-number" onclick="inputDecimal()">.</button>
      <button class="btn-equals" onclick="calculate()">=</button>
    </div>
  </div>

  <script>
    let currentInput = '0';
    let previousInput = '';
    let operator = null;
    let shouldResetScreen = false;
    let expressionStr = '';

    const resultEl = document.getElementById('result');
    const expressionEl = document.getElementById('expression');

    function updateDisplay() {
      resultEl.textContent = currentInput;
    }

    function inputDigit(digit) {
      if (shouldResetScreen) {
        currentInput = digit;
        shouldResetScreen = false;
      } else {
        currentInput = currentInput === '0' ? digit : currentInput + digit;
      }
      updateDisplay();
    }

    function inputDecimal() {
      if (shouldResetScreen) {
        currentInput = '0.';
        shouldResetScreen = false;
        updateDisplay();
        return;
      }
      if (!currentInput.includes('.')) {
        currentInput += '.';
        updateDisplay();
      }
    }

    function inputOperator(op) {
      if (operator && !shouldResetScreen) {
        calculate(true);
      }
      previousInput = currentInput;
      operator = op;
      shouldResetScreen = true;

      const opDisplay = { '+': '+', '-': '−', '*': '×', '/': '÷' }[op];
      expressionEl.textContent = previousInput + ' ' + opDisplay;
    }

    function calculate(chaining = false) {
      if (!operator || shouldResetScreen) return;

      const prev = parseFloat(previousInput);
      const curr = parseFloat(currentInput);
      let result;

      switch (operator) {
        case '+': result = prev + curr; break;
        case '-': result = prev - curr; break;
        case '*': result = prev * curr; break;
        case '/': result = curr !== 0 ? prev / curr : 'Error'; break;
      }

      const opDisplay = { '+': '+', '-': '−', '*': '×', '/': '÷' }[operator];

      if (!chaining) {
        expressionEl.textContent = previousInput + ' ' + opDisplay + ' ' + currentInput + ' =';
      }

      currentInput = result === 'Error' ? 'Error' : String(parseFloat(result.toFixed(10)));
      operator = null;
      previousInput = '';
      shouldResetScreen = true;
      updateDisplay();
    }

    function clearAll() {
      currentInput = '0';
      previousInput = '';
      operator = null;
      shouldResetScreen = false;
      expressionEl.textContent = '';
      updateDisplay();
    }

    function toggleSign() {
      if (currentInput === '0' || currentInput === 'Error') return;
      currentInput = currentInput.startsWith('-')
        ? currentInput.slice(1)
        : '-' + currentInput;
      updateDisplay();
    }

    function percent() {
      if (currentInput === 'Error') return;
      currentInput = String(parseFloat(currentInput) / 100);
      updateDisplay();
    }

    document.addEventListener('keydown', (e) => {
      if (e.key >= '0' && e.key <= '9') inputDigit(e.key);
      else if (e.key === '.') inputDecimal();
      else if (e.key === '+') inputOperator('+');
      else if (e.key === '-') inputOperator('-');
      else if (e.key === '*') inputOperator('*');
      else if (e.key === '/') { e.preventDefault(); inputOperator('/'); }
      else if (e.key === 'Enter' || e.key === '=') calculate();
      else if (e.key === 'Escape') clearAll();
      else if (e.key === 'Backspace') {
        if (currentInput.length > 1 && !shouldResetScreen) {
          currentInput = currentInput.slice(0, -1);
        } else {
          currentInput = '0';
        }
        updateDisplay();
      }
    });
  </script>
</body>
</html>
